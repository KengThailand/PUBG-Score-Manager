<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUBG Score Manager Pro (Web Version)</title>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #2c2f33; --bg-card: #23272a; --text-main: #ffffff; --text-muted: #99aab5;
            --primary: #3498db; --success: #43b581; --warning: #faa61a; --danger: #f04747;
            --purple: #9b59b6; --orange: #e67e22; --gray: #95a5a6;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-main); color: var(--text-main); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 1200px; width: 100%; }
        .card { background-color: var(--bg-card); border-radius: 8px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2); }
        h2 { margin-top: 0; border-bottom: 2px solid var(--primary); padding-bottom: 10px; display: inline-block; font-size: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--text-muted); font-size: 14px;}
        input[type="text"], textarea { width: 100%; padding: 10px; background-color: var(--bg-main); color: var(--text-main); border: 1px solid #444; border-radius: 4px; box-sizing: border-box; font-family: 'Consolas', monospace; margin-bottom: 15px; }
        textarea { resize: vertical; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        .btn { padding: 10px 15px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; transition: opacity 0.2s; color: white; font-size: 13px; }
        .btn:hover { opacity: 0.8; }
        .btn-success { background-color: var(--success); }
        .btn-primary { background-color: var(--primary); }
        .btn-warning { background-color: var(--warning); color: #000; }
        .btn-danger { background-color: var(--danger); }
        .btn-purple { background-color: var(--purple); }
        .btn-orange { background-color: var(--orange); }
        .btn-gray { background-color: var(--gray); color: black;}

        .controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; }
        
        #status { padding: 12px; border-radius: 4px; background-color: rgba(67, 181, 129, 0.1); border-left: 4px solid var(--success); margin-bottom: 20px; font-weight: bold; font-size: 14px;}
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        th, td { padding: 10px 8px; text-align: center; border-bottom: 1px solid #444; }
        th { background-color: #1a1c1e; color: var(--text-muted); text-transform: uppercase; white-space: nowrap;}
        td.text-left, th.text-left { text-align: left; }
        tr:hover { background-color: rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body>

<div class="container">

    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <h2 style="margin: 0; border: none; font-size: 24px;">🏆 PUBG Score Manager</h2>
        <button class="btn btn-success" onclick="saveSettings()" style="font-size: 14px; padding: 10px 20px;">💾 Save All Data</button>
    </div>

    <div class="grid-2">
        <div class="card">
            <label>📋 Team List (Format: 1 TeamName)</label>
            <textarea id="teamList" rows="8" placeholder="1 Team Name 1&#10;2 Team Name 2"></textarea>
        </div>
        <div class="card">
            <label>🎮 MATCH IDs</label>
            <textarea id="matchIds" rows="8" placeholder="Paste one Match ID per line here..."></textarea>
        </div>
    </div>

    <div id="status">Status: Ready</div>

    <div class="card">
        <div class="controls" style="margin-bottom: 10px;">
            <button class="btn btn-gray" onclick="fetchPlayerStats()">🎮 Player Stats (CSV)</button>
            <button class="btn btn-purple" onclick="renderTable('last')">📊 Last Match Score</button>
            <button class="btn btn-warning" onclick="renderTable('overall')">🏆 Overall Score</button>
            <button class="btn btn-success" onclick="processMatches()">➕ Add Match Data</button>
        </div>
        <div class="controls">
            <button class="btn btn-orange" onclick="downloadCSV('last')">📥 Download Last Match CSV</button>
            <button class="btn btn-primary" onclick="downloadCSV('overall')">📥 Download Overall CSV</button>
            <button class="btn btn-danger" onclick="clearData()">🗑️ Reset Board</button>
        </div>
    </div>

    <div class="card" id="tableContainer">
        <h3 id="tableTitle" style="margin-top: 0;">Scoreboard</h3>
        <div style="overflow-x: auto;">
            <table id="scoreTable">
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th class="text-left">Team</th>
                        <th>🎯 LAST KILL</th>
                        <th>WWCD</th>
                        <th>Kills</th>
                        <th>Total</th>
                        <th>Place Pts</th>
                        <th>Damage</th>
                        <th>Knocks</th>
                        <th>Assists</th>
                        <th>Heals</th>
                        <th>Revives</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let storedMatchesData = [];
    // Hidden API Key
    const DEFAULT_API_KEY = 'eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJqdGkiOiJkYTdhNjQwMC1lMzkwLTAxM2MtYTBhOS02ZTk3YjdkYmU4ZjkiLCJpc3MiOiJnYW1lbG9ja2VyIiwiaWF0IjoxNzEzODcwOTg4LCJwdWIiOiJibHVlaG9sZSIsInRpdGxlIjoicHViZyIsImFwcCI6ImRhbmdlcm91cy1zY3JpIn0.HbPpc0raI6eMxD3kJWu56onF7SsHKwqI6nU_1trs-lU';

    document.addEventListener("DOMContentLoaded", () => {
        loadSettings();
    });

    // ==========================================
    // 💾 Storage & Settings
    // ==========================================
    function saveSettings() {
        localStorage.setItem('pubg_teamList', document.getElementById('teamList').value);
        localStorage.setItem('pubg_matchIds', document.getElementById('matchIds').value);
        updateStatus('✅ Team List and Match IDs saved to browser successfully', 'success');
    }

    function loadSettings() {
        document.getElementById('teamList').value = localStorage.getItem('pubg_teamList') || '';
        document.getElementById('matchIds').value = localStorage.getItem('pubg_matchIds') || '';
        
        const savedData = localStorage.getItem('pubg_matchData');
        if (savedData) {
            storedMatchesData = JSON.parse(savedData);
            updateStatus(`Data loaded successfully (${storedMatchesData.length} matches stored)`);
            if(storedMatchesData.length > 0) renderTable('overall');
        }
    }

    function saveData() { 
        localStorage.setItem('pubg_matchData', JSON.stringify(storedMatchesData)); 
    }

    function clearData() {
        if(confirm("Are you sure you want to reset all data and start a new board?")) {
            storedMatchesData = [];
            saveData();
            document.getElementById('matchIds').value = '';
            localStorage.removeItem('pubg_matchIds');
            document.getElementById('tableBody').innerHTML = '';
            updateStatus('🗑️ Score data cleared successfully');
        }
    }

    function updateStatus(msg, type='normal') {
        const el = document.getElementById('status');
        el.innerText = "Status: " + msg;
        el.style.backgroundColor = type === 'error' ? 'rgba(240, 71, 71, 0.1)' : 'rgba(67, 181, 129, 0.1)';
        el.style.borderLeftColor = type === 'error' ? 'var(--danger)' : (type === 'warning' ? 'var(--warning)' : 'var(--success)');
        el.style.color = type === 'error' ? 'var(--danger)' : 'var(--text-main)';
    }

    // ==========================================
    // ⚙️ Core Logic (PUBG API)
    // ==========================================
    function getTeamMapping() {
        const mapping = {};
        const lines = document.getElementById('teamList').value.split('\n');
        lines.forEach(line => {
            const match = line.trim().match(/^(\d+)[\s\t\.\-\:]+(.+)$/);
            if (match) mapping[parseInt(match[1])] = match[2].trim();
        });
        return mapping;
    }

    async function fetchPubgMatch(matchId, apiKey) {
        const cleanId = matchId.replace(/[^a-zA-Z0-9-]/g, '');
        const shards = ["steam", "pc-tournament", "tournament", "kakao", "console", "pc-as", "pc-sea"];
        
        for (let shard of shards) {
            try {
                const response = await fetch(`https://api.pubg.com/shards/${shard}/matches/${cleanId}`, {
                    headers: { "Authorization": `Bearer ${apiKey}`, "Accept": "application/vnd.api+json" }
                });
                
                if (response.status === 429) {
                    alert("⚠️ API Rate Limit reached. Please wait a moment and try again.");
                    return null;
                }
                
                if (response.ok) return await response.json();
            } catch (e) {}
        }
        return null;
    }

    function calcScore(data, mapping, mId) {
        const rule = {1: 10, 2: 6, 3: 5, 4: 4, 5: 3, 6: 2, 7: 1, 8: 1};
        const stats = [];
        const ps = {};
        data.included.forEach(i => { if (i.type === 'participant') ps[i.id] = i.attributes.stats; });

        data.included.forEach(item => {
            if (item.type === 'roster') {
                const rStat = item.attributes.stats;
                let k=0, d=0, knocks=0, assists=0, heals=0, revives=0, surv=0;
                
                item.relationships.participants.data.forEach(pRef => {
                    const pStat = ps[pRef.id];
                    if (pStat) {
                        k += pStat.kills || 0;
                        d += pStat.damageDealt || 0;
                        knocks += pStat.DBNOs || 0;
                        assists += pStat.assists || 0;
                        heals += pStat.heals || 0;
                        revives += pStat.revives || 0;
                        surv += pStat.timeSurvived || 0;
                    }
                });

                const tName = mapping[rStat.teamId] || `Team ${rStat.teamId}`;
                stats.push({
                    "Team Name": tName, "Wins": rStat.rank === 1 ? 1 : 0, "Kill Points": k,
                    "Placement Points": rule[rStat.rank] || 0, "Total Points": (rule[rStat.rank] || 0) + k,
                    "Damage": Math.round(d * 100) / 100, "Knocks": knocks, "Assists": assists,
                    "Heals": heals, "Revives": revives, "Survival Time": surv, "Number of matches": 1, "Match ID": mId
                });
            }
        });
        return stats;
    }

    async function processMatches() {
        const apiKey = DEFAULT_API_KEY;
        const matchIds = document.getElementById('matchIds').value.split('\n').map(id => id.replace(/[^a-zA-Z0-9-]/g, '')).filter(id => id !== "");
        if (matchIds.length === 0) return alert("Please paste at least one Match ID");

        updateStatus("⏳ Fetching data from PUBG API...", "warning");
        const mapping = getTeamMapping();
        let addedCount = 0;
        let failedIds = [];

        for (let mId of matchIds) {
            const rawData = await fetchPubgMatch(mId, apiKey);
            if (rawData) {
                storedMatchesData.push(calcScore(rawData, mapping, mId));
                addedCount++;
            } else {
                failedIds.push(mId);
            }
        }

        if (addedCount > 0) {
            document.getElementById('matchIds').value = failedIds.join('\n');
            saveData();
            saveSettings();
            
            if (failedIds.length > 0) {
                updateStatus(`⚠️ Successfully added ${addedCount} matches. Failed to find ${failedIds.length} matches (Failed IDs remain in the box).`, "warning");
                alert(`Failed to fetch ${failedIds.length} matches. Please verify the Match IDs.`);
            } else {
                updateStatus(`✅ Success! Added ${addedCount} matches (Total stored: ${storedMatchesData.length})`, "success");
            }
            renderTable('overall');
        } else {
            updateStatus("❌ Failed to fetch data. Please verify your Match IDs.", "error");
            alert("No Match IDs found. Please check your IDs and try again.");
        }
    }

    // ==========================================
    // 🎮 Player Stats (CSV Export) + DMG TAKEN
    // ==========================================
    async function fetchPlayerStats() {
        const apiKey = DEFAULT_API_KEY;
        let matchLines = document.getElementById('matchIds').value.split('\n').map(id => id.replace(/[^a-zA-Z0-9-]/g, '')).filter(id => id !== "");
        
        let mId = "";
        if (matchLines.length > 0) {
            mId = matchLines[matchLines.length - 1]; 
        } else if (storedMatchesData.length > 0) {
            mId = storedMatchesData[storedMatchesData.length - 1][0]['Match ID']; 
        } else {
            return alert("Please paste at least one Match ID in the box to fetch player stats.");
        }

        updateStatus(`⏳ Loading match data for ${mId.substring(0,8)}...`, "warning");
        const mapping = getTeamMapping();

        const mData = await fetchPubgMatch(mId, apiKey);
        if (!mData) return updateStatus("❌ Failed to fetch player data (API not responding or ID not found)", "error");

        const ps = {};
        mData.included.forEach(i => { if(i.type === 'participant') ps[i.id] = i; });

        const playerStatsMap = {};
        
        // 1. Gather basic stats
        mData.included.forEach(item => {
            if (item.type === 'roster') {
                const tid = item.attributes.stats.teamId;
                const teamName = mapping[tid] || `Team ${tid}`;
                item.relationships.participants.data.forEach(pRef => {
                    if (ps[pRef.id]) {
                        const pInfo = ps[pRef.id].attributes.stats;
                        const pName = pInfo.name || "Unknown";
                        playerStatsMap[pName] = {
                            "Team": teamName, "Player": pName,
                            "Kills": pInfo.kills || 0, "Knocks": pInfo.DBNOs || 0,
                            "Assists": pInfo.assists || 0, "Damage": Math.round((pInfo.damageDealt||0)*100)/100,
                            "DmgTaken": 0.0, // Will be filled from telemetry
                            "Headshots": pInfo.headshotKills || 0, "LongestKill": Math.round((pInfo.longestKill||0)*100)/100,
                            "TimeSurvived": Math.round((pInfo.timeSurvived||0)*100)/100
                        };
                    }
                });
            }
        });

        // 2. Fetch Telemetry for Dmg Taken
        updateStatus(`⏳ Downloading Telemetry file (This may take 5-10 seconds)...`, "warning");
        try {
            const assetId = mData.data.relationships.assets.data[0].id;
            const telemetryUrlItem = mData.included.find(item => item.id === assetId);
            
            if (telemetryUrlItem) {
                const teleRes = await fetch(telemetryUrlItem.attributes.URL);
                const teleData = await teleRes.json();

                updateStatus(`⏳ Calculating DMG TAKEN...`, "warning");
                teleData.forEach(event => {
                    if (event._T === 'LogPlayerTakeDamage') {
                        const damageType = event.damageTypeCategory || '';
                        // Filter out Bluezone, Falling, and Vehicle hits to match Twire
                        if (['Damage_BlueZone', 'Damage_Groggy', 'Damage_Fall', 'Damage_VehicleHit'].includes(damageType)) return;
                        
                        const victim = event.victim;
                        const attacker = event.attacker;
                        const damage = event.damage || 0.0;
                        
                        if (victim && victim.name) {
                            const vName = victim.name;
                            // Ignore self-damage
                            if (attacker && attacker.name === vName) return;
                            
                            if (playerStatsMap[vName]) {
                                playerStatsMap[vName].DmgTaken += damage;
                            }
                        }
                    }
                });
            }
        } catch(e) {
            console.error("Telemetry fetch failed", e);
            updateStatus(`⚠️ Could not fetch Telemetry (DMG TAKEN will be 0) - ${e.message}`, "warning");
        }

        // 3. Format and sort
        const playerStats = Object.values(playerStatsMap);
        playerStats.forEach(p => p.DmgTaken = Math.round(p.DmgTaken * 100) / 100);

        playerStats.sort((a,b) => {
            if(a.Team !== b.Team) return a.Team.localeCompare(b.Team);
            if(b.Kills !== a.Kills) return b.Kills - a.Kills;
            if(b.Knocks !== a.Knocks) return b.Knocks - a.Knocks;
            return b.Damage - a.Damage;
        });

        exportCSV(playerStats, `PlayerStats_${mId.substring(0,6)}.csv`);
        updateStatus(`✅ Player stats downloaded successfully!`, "success");
    }

    // ==========================================
    // 📊 Render Table & CSV Logic
    // ==========================================
    function getFormattedData(isOverall) {
        if(storedMatchesData.length === 0) return [];
        let data = [];
        
        if (!isOverall) {
            data = [...storedMatchesData[storedMatchesData.length - 1]];
        } else {
            const map = {};
            storedMatchesData.forEach(matchArr => {
                matchArr.forEach(t => {
                    if (!map[t['Team Name']]) map[t['Team Name']] = { "Team Name": t['Team Name'], "Wins":0, "Kill Points":0, "Placement Points":0, "Total Points":0, "Damage":0, "Knocks":0, "Assists":0, "Heals":0, "Revives":0, "Survival Time":0, "Number of matches":0, "Match ID": [] };
                    const o = map[t['Team Name']];
                    o["Wins"] += t["Wins"]; o["Kill Points"] += t["Kill Points"]; o["Placement Points"] += t["Placement Points"];
                    o["Total Points"] += t["Total Points"]; o["Damage"] += t["Damage"]; o["Knocks"] += t["Knocks"];
                    o["Assists"] += t["Assists"]; o["Heals"] += t["Heals"]; o["Revives"] += t["Revives"]; o["Number of matches"] += 1;
                    if(t["Match ID"] && !o["Match ID"].includes(t["Match ID"])) o["Match ID"].push(t["Match ID"]);
                });
            });
            data = Object.values(map);
            data.forEach(d => { d["Damage"] = Math.round(d["Damage"]*100)/100; d["Match ID"] = d["Match ID"].join(", "); });
        }

        data.sort((a, b) => {
            if (b["Total Points"] !== a["Total Points"]) return b["Total Points"] - a["Total Points"];
            if (b["Placement Points"] !== a["Placement Points"]) return b["Placement Points"] - a["Placement Points"];
            if (b["Kill Points"] !== a["Kill Points"]) return b["Kill Points"] - a["Kill Points"];
            if (b["Wins"] !== a["Wins"]) return b["Wins"] - a["Wins"];
            return b["Damage"] - a["Damage"];
        });

        const lastMatchDict = {};
        if(storedMatchesData.length > 0) {
            storedMatchesData[storedMatchesData.length - 1].forEach(t => {
                lastMatchDict[t["Team Name"]] = { k: t["Kill Points"], t: t["Total Points"] };
            });
        }

        return data.map((item, index) => {
            const lm = lastMatchDict[item["Team Name"]] || {k:0, t:0};
            return {
                "Rank": index + 1, "Team Logo": "", "Team Name": item["Team Name"],
                "Wins": item["Wins"], "Kill Points": item["Kill Points"], "Total Points": item["Total Points"],
                "Placement Points": item["Placement Points"], "Damage": item["Damage"], "Knocks": item["Knocks"] || 0,
                "Assists": item["Assists"] || 0, "Heals": item["Heals"] || 0, "Revives": item["Revives"] || 0,
                "Survival Time": item["Survival Time"] || 0, "Number of matches": item["Number of matches"],
                "Previous position": "SAME", "Previous position change": 0,
                "🎯 LAST KILL": lm.k, "total in last match": lm.t, "Match ID": item["Match ID"] || ""
            };
        });
    }

    function renderTable(mode) {
        if (storedMatchesData.length === 0) return alert("No score data available");
        const isOverall = mode === 'overall';
        const displayData = getFormattedData(isOverall);
        
        document.getElementById('tableTitle').innerText = isOverall ? "🏆 Overall Scoreboard" : "📊 Last Match Scoreboard";
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';

        displayData.forEach(r => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><strong>${r['Rank']}</strong></td>
                <td class="text-left" style="font-weight: bold; color: var(--warning);">${r['Team Name']}</td>
                <td style="color: var(--primary); font-weight: bold;">${r['🎯 LAST KILL']}</td>
                <td>${r['Wins']}</td>
                <td>${r['Kill Points']}</td>
                <td style="color: var(--success); font-weight: bold; font-size: 15px;">${r['Total Points']}</td>
                <td>${r['Placement Points']}</td>
                <td>${r['Damage'].toLocaleString()}</td>
                <td>${r['Knocks']}</td>
                <td>${r['Assists']}</td>
                <td>${r['Heals']}</td>
                <td>${r['Revives']}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    function downloadCSV(mode) {
        if (storedMatchesData.length === 0) return alert("No score data available");
        const data = getFormattedData(mode === 'overall');
        exportCSV(data, mode === 'overall' ? "Overall_Leaderboard.csv" : `Match_${storedMatchesData.length}.csv`);
    }

    function exportCSV(dataArray, filename) {
        if (!dataArray || dataArray.length === 0) return;
        const headers = Object.keys(dataArray[0]);
        let csvContent = "\uFEFF" + headers.join(",") + "\n"; 
        
        dataArray.forEach(row => {
            const values = headers.map(h => {
                let val = row[h] === null || row[h] === undefined ? "" : String(row[h]);
                return `"${val.replace(/"/g, '""')}"`;
            });
            csvContent += values.join(",") + "\n";
        });

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = filename;
        link.click();
    }
</script>
</body>
</html>
